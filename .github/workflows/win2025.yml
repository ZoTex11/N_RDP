name: Windows 2025 (Pinggy Ultimate Tunnel)

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 9999

    steps:
    - name: Enable RDP Access and Create User
      run: |
        # 1. تفعيل خدمة الـ RDP وتخطي جدار الحماية للويندوز
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
        # 2. إنشاء مستخدم جديد بصلاحيات الـ Administrator للاتصال
        net user administrator JohnTech1234 /add
        net localgroup administrators administrator /add

    - name: Start Pinggy TCP Tunnel (RDP 3389)
      run: |
        # 3. تشغيل النفق في الخلفية وحفظ المخرجات في مسار ثابت C:\pinggy.log
        Start-Process powershell -ArgumentList "-NoExit -Command `"ssh -o StrictHostKeyChecking=no -p 443 -R 0:localhost:3389 rdp@a.pinggy.io > C:\pinggy.log`""
        
        # الانتظار 20 ثانية للتأكد من اكتمال الاتصال وتوليد الرابط من السيرفر
        Start-Sleep -Seconds 20
        
        # طباعة الرابط المستخرج مباشرة من المسار الثابت
        Write-Host "=== Your RDP Connection Info ==="
        if (Test-Path "C:\pinggy.log") {
            Get-Content "C:\pinggy.log" | Select-String "pinggy.link"
        } else {
            Write-Host "Log file not found at local root, trying to fetch content..."
        }
        Write-Host "================================"

    - name: Keep Runner Alive
      run: |
        # 4. حلقة تكرارية مستمرة تمنع جهاز GitHub من الإغلاق التلقائي
        $ServerLoop = 1
        while ($ServerLoop -eq 1) {
            Start-Sleep -Seconds 30
            Write-Host "Server is still running... Keep alive."
        }
