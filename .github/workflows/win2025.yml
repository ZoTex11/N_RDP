name: Windows 2025 (Pinggy Auto-Confirm)

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 9999

    steps:
    - name: Enable RDP Access and Create User
      run: |
        # 1. تفعيل خدمة الـ RDP وتخطي جدار الحماية للويندوز
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
        # 2. إنشاء مستخدم جديد بصلاحيات الـ Administrator للاتصال
        net user administrator JohnTech1234 /add
        net localgroup administrators administrator /add

    - name: Start Pinggy Tunnel and Keep Alive
      run: |
        # 3. تشغيل النفق مع إضافة خيار تخطي سؤال الأمان (UserKnownHostsFile=/dev/null) وتوجيه المخرجات
        Start-Process powershell -ArgumentList "-NoExit -Command `"ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 443 -R 0:localhost:3389 rdp@a.pinggy.io > C:\pinggy.log`""
        
        # الانتظار 20 ثانية للتأكد من تخطي الأداة للسؤال وتوليد الرابط
        Start-Sleep -Seconds 20
        
        # طباعة محتوى الملف كاملاً بدون شروط لرؤية النتيجة
        Write-Host "=== Your RDP Connection Info ==="
        if (Test-Path "C:\pinggy.log") {
            Get-Content "C:\pinggy.log"
        } else {
            Write-Host "Log file not created yet."
        }
        Write-Host "================================"
        
        # 4. حلقة تكرارية مدمجة لإبقاء السيرفر حياً
        $ServerLoop = 1
        while ($ServerLoop -eq 1) {
            Start-Sleep -Seconds 30
            Write-Host "Server is still running... Keep alive."
        }
